<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TIN HỌC BẢO BỐI - Tra Cứu Bảo Hành</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20">
  
  <!-- Header Mobile -->
  <div class="bg-blue-600 text-white p-5 rounded-b-3xl shadow-lg text-center space-y-1">
    <h1 class="text-xl font-extrabold tracking-wide">TIN HỌC BẢO BỐI</h1>
    <p class="text-xs text-blue-100">Tra cứu tiến độ sửa chữa & thời hạn bảo hành</p>
  </div>

  <div class="max-w-md mx-auto px-4 -mt-4 space-y-4">
    
    <!-- Thanh Tìm Kiếm & Quét Mã -->
    <div class="bg-white p-4 rounded-2xl shadow-md space-y-3">
      <div class="relative">
        <input type="text" id="searchInput" placeholder="Nhập SĐT, IMEI hoặc Mã đơn..." class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
        <button onclick="searchOrder()" class="absolute right-2 top-2 bg-blue-600 text-white p-1.5 rounded-lg text-xs font-bold">Tìm</button>
      </div>

      <button onclick="toggleQRScanner()" class="w-full bg-slate-800 text-white py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-2 active:scale-95 transition">
        <span>📷</span> Quét Mã QR Trên Tem Bảo Hành
      </button>
    </div>

    <!-- Scanner Modal Mobile -->
    <div id="scannerModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-4">
      <div class="bg-white p-4 rounded-2xl w-full max-w-xs text-center space-y-3">
        <h3 class="text-sm font-bold text-slate-800">Đưa camera vào tem QR</h3>
        <div id="reader" class="rounded-xl overflow-hidden"></div>
        <button onclick="toggleQRScanner()" class="w-full bg-red-500 text-white py-2 rounded-xl text-xs font-bold">Đóng</button>
      </div>
    </div>

    <!-- Container Kết Quả -->
    <div id="resultContainer" class="space-y-4"></div>

  </div>

  <!-- Nút Chat Zalo Hỗ Trợ Nhanh (Góc dưới màn hình) -->
  <a href="https://zalo.me/0901234567" target="_blank" class="fixed bottom-4 right-4 bg-blue-600 text-white p-3.5 rounded-full shadow-xl flex items-center gap-2 text-xs font-bold z-40 active:scale-95 transition">
    <span>💬</span> Chat Zalo Hỗ Trợ
  </a>

  <script>
    let html5QrcodeScanner = null;

    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      if (code) {
        document.getElementById('searchInput').value = code;
        searchOrder();
      }
    });

    function toggleQRScanner() {
      const modal = document.getElementById('scannerModal');
      modal.classList.toggle('hidden');
      if (!modal.classList.contains('hidden')) {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
        html5QrcodeScanner.render((decodedText) => {
          document.getElementById('searchInput').value = decodedText;
          toggleQRScanner();
          html5QrcodeScanner.clear();
          searchOrder();
        });
      } else if (html5QrcodeScanner) {
        html5QrcodeScanner.clear();
      }
    }

    async function searchOrder() {
      const query = document.getElementById('searchInput').value.trim();
      const container = document.getElementById('resultContainer');
      if (!query) return;

      container.innerHTML = '<div class="text-center py-6 text-slate-400 text-xs">⏳ Đang tìm kiếm...</div>';

      try {
        const res = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (!data || data.length === 0) {
          container.innerHTML = '<div class="p-4 bg-white rounded-2xl text-center text-xs text-slate-500 shadow-sm">Không tìm thấy thông tin phù hợp!</div>';
          return;
        }

        container.innerHTML = data.map(item => {
          const warrantyInfo = calculateWarranty(item.completedDate || item.receivedDate, item.warrantyPeriod);
          const timelineHtml = renderTimeline(item.status);

          return `
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-4">
              <div class="flex justify-between items-center border-b pb-2">
                <span class="text-[10px] font-extrabold px-2 py-0.5 bg-blue-50 text-blue-600 rounded-md">${item.orderCode}</span>
                <span class="text-xs font-bold text-blue-600">${item.status || 'Đang tiếp nhận'}</span>
              </div>

              <!-- Thanh Tiến Trình Timeline 4 Bước -->
              <div>
                <div class="text-[11px] font-bold text-slate-600 mb-2 text-center">Tiến Độ Sửa Chữa & Lắp Đặt</div>
                ${timelineHtml}
              </div>

              <!-- Thẻ Trạng Thái Bảo Hành -->
              <div class="p-3 rounded-xl ${warrantyInfo.isExpired ? 'bg-red-50 border border-red-100' : 'bg-emerald-50 border border-emerald-100'}">
                <div class="text-xs font-bold ${warrantyInfo.isExpired ? 'text-red-600' : 'text-emerald-700'}">
                  ${warrantyInfo.statusText}
                </div>
                <div class="text-[11px] mt-1 font-semibold ${warrantyInfo.isExpired ? 'text-red-500' : 'text-emerald-600'}">
                  ${warrantyInfo.countdownText}
                </div>
              </div>

              <!-- Chi tiết thông tin khách & thiết bị -->
              <div class="text-xs space-y-1.5 text-slate-600">
                <div class="font-bold text-sm text-slate-800">${item.deviceName}</div>
                <div class="bg-slate-50 p-2.5 rounded-xl border text-slate-700 space-y-1">
                  <div><strong>Khách hàng:</strong> ${item.customerName || 'N/A'}</div>
                  <div><strong>Số điện thoại:</strong> ${maskPhone(item.phone)}</div>
                </div>
                <div><strong>IMEI/Serial:</strong> ${item.imei || 'N/A'}</div>
                <div><strong>Ngày nhận/lắp:</strong> ${formatDateTime(item.receivedDate)}</div>
                ${item.completedDate ? `<div><strong>Ngày hoàn tất/trả:</strong> ${formatDateTime(item.completedDate)}</div>` : ''}
                ${item.issueDescription ? `<div class="bg-slate-50 p-2 rounded-lg border text-[11px]"><strong>Nội dung:</strong> ${item.issueDescription}</div>` : ''}
              </div>

              <!-- Hình ảnh -->
              ${(item.inImages?.length || item.outImages?.length) ? `
                <div class="pt-2 border-t">
                  <div class="text-[11px] font-bold text-slate-500 mb-1">Hình ảnh thiết bị:</div>
                  <div class="flex gap-2 overflow-x-auto pb-1">
                    ${(item.inImages || []).map(img => `<a href="${img}" target="_blank"><img src="${img}" class="w-16 h-16 object-cover rounded-lg border"></a>`).join('')}
                    ${(item.outImages || []).map(img => `<a href="${img}" target="_blank"><img src="${img}" class="w-16 h-16 object-cover rounded-lg border border-emerald-400"></a>`).join('')}
                  </div>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');
      } catch (err) {
        container.innerHTML = '<div class="p-4 bg-red-50 text-red-500 rounded-2xl text-center text-xs">Lỗi kết nối!</div>';
      }
    }

    // Hàm tạo Thanh Tiến Trình Visual Timeline
    function renderTimeline(status) {
      const steps = ['Đang tiếp nhận', 'Đang xử lý', 'Đã hoàn tất', 'Đã trả khách'];
      let currentIndex = steps.indexOf(status);
      if (currentIndex === -1) currentIndex = 0;

      return `
        <div class="flex items-center justify-between text-[10px] font-bold text-center px-1">
          ${steps.map((step, idx) => {
            const isDone = idx <= currentIndex;
            const bgColor = isDone ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-400';
            const textColor = isDone ? 'text-blue-600 font-bold' : 'text-slate-400';
            return `
              <div class="flex-1 flex flex-col items-center relative">
                <div class="w-6 h-6 rounded-full ${bgColor} flex items-center justify-center z-10 text-[10px]">
                  ${isDone ? '✓' : idx + 1}
                </div>
                <span class="mt-1 ${textColor} scale-90">${step}</span>
              </div>
            `;
          }).join('<div class="h-0.5 bg-slate-200 flex-1 -mt-4"></div>')}
        </div>
      `;
    }

    function calculateWarranty(startDateStr, months) {
      if (!months || months == 0) return { isExpired: true, statusText: 'Không Bảo Hành', countdownText: 'N/A' };
      const start = parseDateLocal(startDateStr);
      const expire = new Date(start);
      expire.setMonth(expire.getMonth() + parseInt(months));
      const diffDays = Math.ceil((expire - new Date()) / (1000 * 60 * 60 * 24));

      if (diffDays < 0) {
        return { isExpired: true, statusText: '❌ Hết Hạn Bảo Hành', countdownText: `Đã quá hạn ${Math.abs(diffDays)} ngày` };
      }
      return { isExpired: false, statusText: '🛡️ Còn Bảo Hành', countdownText: `Còn lại ${diffDays} ngày bảo hành` };
    }

    function maskPhone(phone) {
      if (!phone) return 'N/A';
      return phone.replace(/(\d{4})(\d{3})(\d{3})/, '$1***$3');
    }

    // Parse chuỗi date không bị lệch múi giờ
    function parseDateLocal(dStr) {
      if (!dStr) return new Date();
      if (dStr.includes('T')) {
        const parts = dStr.split('T');
        const [y, m, d] = parts[0].split('-');
        const [h, min, sec] = parts[1].split(':');
        return new Date(y, m - 1, d, h || 0, min || 0, (sec || '0').slice(0,2));
      }
      return new Date(dStr);
    }

    function formatDateTime(dStr) {
      if (!dStr) return 'N/A';
      const d = parseDateLocal(dStr);
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      const sec = String(d.getSeconds()).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = d.getFullYear();
      return `${h}:${min}:${sec} - ${day}/${month}/${year}`;
    }
  </script>
</body>
</html>
