<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TIN HỌC BẢO BỐI - Quản Lý Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Widget Upload Cloudinary -->
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    @media print {
      body * { visibility: hidden; }
      #printableTicket, #printableTicket * { visibility: visible; }
      #printableTicket { position: absolute; left: 0; top: 0; width: 100%; }
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20">

  <!-- Header Sticky Admin -->
  <div class="sticky top-0 z-40 bg-slate-900 text-white p-4 shadow-md flex justify-between items-center">
    <div>
      <h1 class="text-sm font-extrabold text-blue-400">TIN HỌC BẢO BỐI</h1>
      <p class="text-[10px] text-slate-400">Hệ Thống Quản Lý Sửa Chữa & Lắp Đặt</p>
    </div>
    <button onclick="loadOrders()" class="bg-slate-800 p-2 rounded-xl text-xs active:scale-95">🔄 Reload</button>
  </div>

  <div class="max-w-md mx-auto p-4 space-y-4">

    <!-- Form Tiếp Nhận Mobile -->
    <div class="bg-white p-4 rounded-2xl shadow-sm space-y-3">
      <h2 class="text-sm font-bold text-slate-800 border-b pb-2 flex justify-between items-center">
        <span>➕ Tạo Đơn / Lắp Đặt Mới</span>
        <span class="text-[10px] font-normal text-slate-400">Mobile Admin</span>
      </h2>

      <form id="orderForm" onsubmit="createOrder(event)" class="space-y-3 text-xs">
        <div>
          <label class="font-semibold text-slate-600">Loại dịch vụ</label>
          <select id="serviceType" class="w-full mt-1 p-2.5 bg-slate-50 border rounded-xl font-medium">
            <option value="Sửa chữa">🛠️ Sửa chữa thiết bị</option>
            <option value="Lắp mới / Bán mới">📷 Lắp mới / Bán mới (Camera, PC...)</option>
          </select>
        </div>

        <div>
          <label class="font-semibold text-slate-600">Ngày giờ nhận / lắp đặt</label>
          <input type="datetime-local" id="receivedDate" step="1" class="w-full mt-1 p-2.5 bg-slate-50 border rounded-xl font-medium">
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="font-semibold text-slate-600">Tên khách *</label>
            <input type="text" id="customerName" required placeholder="Nguyễn Văn A" class="w-full mt-1 p-2.5 bg-slate-50 border rounded-xl">
          </div>
          <div>
            <label class="font-semibold text-slate-600">SĐT *</label>
            <input type="tel" id="phone" required onblur="checkHistory()" placeholder="0901234567" class="w-full mt-1 p-2.5 bg-slate-50 border rounded-xl">
          </div>
        </div>

        <div>
          <label class="font-semibold text-slate-600">Số IMEI / Serial</label>
          <input type="text" id="imei" onblur="checkHistory()" placeholder="Nhập IMEI hoặc Serial máy..." class="w-full mt-1 p-2.5 bg-slate-50 border rounded-xl">
        </div>

        <!-- Cảnh Báo Lịch Sử Sửa Chữa Cũ -->
        <div id="historyAlert" class="hidden p-3 bg-amber-50 border border-amber-200 rounded-xl space-y-1 text-[11px] text-amber-800">
          <div class="font-bold flex items-center gap-1">⚠️ Lịch sử thiết bị / SĐT cũ:</div>
          <div id="historyContent"></div>
        </div>

        <div>
          <label class="font-semibold text-slate-600">Tên thiết bị / Gói camera *</label>
          <input type="text" id="deviceName" required placeholder="iPhone 13 / Gói 4 Cam Dahua" class="w-full mt-1 p-2.5 bg-slate-50 border rounded-xl">
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="font-semibold text-slate-600">Bảo hành</label>
            <select id="warrantyPeriod" class="w-full mt-1 p-2.5 bg-slate-50 border rounded-xl">
              <option value="0">Không BH</option>
              <option value="3">3 Tháng</option>
              <option value="6">6 Tháng</option>
              <option value="12" selected>12 Tháng</option>
              <option value="24">24 Tháng</option>
              <option value="36">36 Tháng</option>
            </select>
          </div>
          <div>
            <label class="font-semibold text-slate-600">Ngoại hình máy</label>
            <input type="text" id="conditionNotes" placeholder="Trầy xước..." class="w-full mt-1 p-2.5 bg-slate-50 border rounded-xl">
          </div>
        </div>

        <div>
          <label class="font-semibold text-slate-600">Mô tả lỗi / Yêu cầu</label>
          <textarea id="issueDescription" rows="2" placeholder="Tình trạng máy lúc nhận..." class="w-full mt-1 p-2.5 bg-slate-50 border rounded-xl"></textarea>
        </div>

        <!-- Upload Ảnh Trực Tiếp Bằng Cloudinary -->
        <div>
          <label class="font-semibold text-slate-600 block mb-1">Hình ảnh thiết bị lúc nhận</label>
          <button type="button" onclick="openCloudinaryWidget()" class="w-full bg-slate-800 text-white py-2.5 rounded-xl font-bold flex items-center justify-center gap-2">
            📸 Chụp / Chọn Ảnh Tải Lên
          </button>
          <div id="uploadPreview" class="flex gap-2 overflow-x-auto mt-2"></div>
          <input type="hidden" id="inImages">
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl active:scale-95 transition">Tạo Phiếu Nhận Máy</button>
      </form>
    </div>

    <!-- Danh Sách Quản Lý Mobile -->
    <div class="bg-white p-4 rounded-2xl shadow-sm space-y-3">
      <h2 class="text-sm font-bold text-slate-800">📋 Danh Sách Đơn Gần Đây</h2>
      <div id="orderList" class="space-y-3"></div>
    </div>

  </div>

  <!-- Modal In Phiếu & Mã QR Tem -->
  <div id="printModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white p-5 rounded-2xl max-w-xs w-full text-center space-y-4">
      
      <!-- Khung Phiếu In -->
      <div id="printableTicket" class="p-4 bg-white text-left space-y-2 text-xs border rounded-xl text-slate-800">
        <div class="text-center border-b pb-2">
          <div class="font-black text-base text-blue-600">TIN HỌC BẢO BỐI</div>
          <div class="text-[10px] text-slate-500">PHIẾU TIẾP NHẬN & BẢO HÀNH</div>
        </div>
        <div><strong>Mã đơn:</strong> <span id="pOrderCode" class="font-bold text-blue-600"></span></div>
        <div><strong>Khách hàng:</strong> <span id="pCustomer"></span></div>
        <div><strong>SĐT:</strong> <span id="pPhone"></span></div>
        <div><strong>Thiết bị:</strong> <span id="pDevice"></span></div>
        <div><strong>IMEI/Serial:</strong> <span id="pImei"></span></div>
        <div><strong>Thời gian nhận:</strong> <span id="pReceivedTime"></span></div>
        <div><strong>Bảo hành:</strong> <span id="pWarranty"></span></div>
        <div class="flex justify-center pt-2">
          <div id="qrcode"></div>
        </div>
        <div class="text-[9px] text-center text-slate-400 mt-1">Quét mã QR để tra cứu bảo hành</div>
      </div>

      <div class="flex gap-2">
        <button onclick="window.print()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl text-xs font-bold">🖨️ In Phiếu</button>
        <button onclick="closePrintModal()" class="flex-1 bg-slate-200 text-slate-700 py-2 rounded-xl text-xs font-bold">Đóng</button>
      </div>
    </div>
  </div>

  <script>
    let uploadedImageUrls = [];

    // Cấu hình mặc định ô Ngày giờ giờ phút giây hiện tại
    function setNowDateTime() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('receivedDate').value = now.toISOString().slice(0, 19);
    }
    setNowDateTime();

    // Widget Upload Cloudinary (Demo Cloud Name)
    function openCloudinaryWidget() {
      cloudinary.openUploadWidget({
        cloudName: 'demo', 
        uploadPreset: 'docs_upload_example_us_preset',
        sources: ['local', 'camera'],
        multiple: true,
        maxFiles: 5
      }, (error, result) => {
        if (!error && result && result.event === "success") {
          uploadedImageUrls.push(result.info.secure_url);
          document.getElementById('inImages').value = uploadedImageUrls.join(',');
          
          // Preview ảnh vừa upload
          const preview = document.getElementById('uploadPreview');
          preview.innerHTML = uploadedImageUrls.map(url => `
            <img src="${url}" class="w-12 h-12 object-cover rounded-lg border">
          `).join('');
        }
      });
    }

    async function checkHistory() {
      const imei = document.getElementById('imei').value.trim();
      const phone = document.getElementById('phone').value.trim();
      if (!imei && !phone) return;

      const res = await fetch(`/api/admin/history?imei=${encodeURIComponent(imei)}&phone=${encodeURIComponent(phone)}`);
      const data = await res.json();

      const alertBox = document.getElementById('historyAlert');
      const content = document.getElementById('historyContent');

      if (data && data.length > 0) {
        alertBox.classList.remove('hidden');
        content.innerHTML = data.map(h => `
          <div>• <strong>${h.orderCode}</strong> (${formatDateTime(h.receivedDate)}): ${h.deviceName} - <em>${h.status}</em></div>
        `).join('');
      } else {
        alertBox.classList.add('hidden');
      }
    }

    async function loadOrders() {
      const list = document.getElementById('orderList');
      try {
        const res = await fetch('/api/admin/orders');
        const orders = await res.json();

        if (!orders.length) {
          list.innerHTML = '<div class="text-center text-xs text-slate-400 py-4">Chưa có đơn nào</div>';
          return;
        }

        list.innerHTML = orders.map(o => `
          <div class="border rounded-xl p-3 bg-slate-50 space-y-2 text-xs">
            <div class="flex justify-between items-center">
              <span class="font-bold text-blue-600">${o.orderCode}</span>
              <select onchange="updateStatus('${o._id}', this.value)" class="text-[11px] border rounded p-1 bg-white font-medium">
                <option value="Đang tiếp nhận" ${o.status === 'Đang tiếp nhận' ? 'selected' : ''}>Đang tiếp nhận</option>
                <option value="Đang xử lý" ${o.status === 'Đang xử lý' ? 'selected' : ''}>Đang xử lý</option>
                <option value="Đã hoàn tất" ${o.status === 'Đã hoàn tất' ? 'selected' : ''}>Đã hoàn tất</option>
                <option value="Đã trả khách" ${o.status === 'Đã trả khách' ? 'selected' : ''}>Đã trả khách</option>
              </select>
            </div>

            <div>
              <div class="font-bold text-slate-800 text-sm">${o.deviceName}</div>
              <div class="text-slate-500">Khách: ${o.customerName} - ${o.phone}</div>
              <div class="text-slate-500">IMEI: ${o.imei || 'N/A'} | BH: ${o.warrantyPeriod || 0}T</div>
              <div class="text-[10px] text-slate-400">Thời gian: ${formatDateTime(o.receivedDate)}</div>
            </div>

            <div class="flex gap-2 pt-1 border-t">
              <button onclick='openPrintModal(${JSON.stringify(o)})' class="bg-emerald-600 text-white px-2.5 py-1 rounded-lg text-[10px] font-bold">🖨️ Tem QR / In</button>
              <button onclick="deleteOrder('${o._id}')" class="text-red-500 text-[10px] ml-auto">Xóa</button>
            </div>
          </div>
        `).join('');
      } catch (err) {}
    }

    async function createOrder(e) {
      e.preventDefault();
      const inImagesRaw = document.getElementById('inImages').value;
      const bodyData = {
        serviceType: document.getElementById('serviceType').value,
        receivedDate: document.getElementById('receivedDate').value,
        customerName: document.getElementById('customerName').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        deviceName: document.getElementById('deviceName').value.trim(),
        imei: document.getElementById('imei').value.trim(),
        warrantyPeriod: Number(document.getElementById('warrantyPeriod').value),
        conditionNotes: document.getElementById('conditionNotes').value.trim(),
        issueDescription: document.getElementById('issueDescription').value.trim(),
        inImages: inImagesRaw ? inImagesRaw.split(',') : []
      };

      const res = await fetch('/api/admin/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(bodyData)
      });

      if (res.ok) {
        alert('✅ Tạo phiếu thành công!');
        document.getElementById('orderForm').reset();
        uploadedImageUrls = [];
        document.getElementById('uploadPreview').innerHTML = '';
        document.getElementById('historyAlert').classList.add('hidden');
        setNowDateTime();
        loadOrders();
      }
    }

    function openPrintModal(order) {
      document.getElementById('pOrderCode').innerText = order.orderCode;
      document.getElementById('pCustomer').innerText = order.customerName;
      document.getElementById('pPhone').innerText = order.phone;
      document.getElementById('pDevice').innerText = order.deviceName;
      document.getElementById('pImei').innerText = order.imei || 'N/A';
      document.getElementById('pReceivedTime').innerText = formatDateTime(order.receivedDate);
      document.getElementById('pWarranty').innerText = (order.warrantyPeriod || 0) + ' Tháng';

      document.getElementById('qrcode').innerHTML = '';
      const searchUrl = `${window.location.origin}/index.html?code=${order.orderCode}`;
      new QRCode(document.getElementById("qrcode"), { text: searchUrl, width: 90, height: 90 });

      document.getElementById('printModal').classList.remove('hidden');
    }

    function closePrintModal() {
      document.getElementById('printModal').classList.add('hidden');
    }

    function formatDateTime(d) {
      if (!d) return 'N/A';
      const date = new Date(d);
      const timeStr = date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dateStr = date.toLocaleDateString('vi-VN');
      return `${timeStr} - ${dateStr}`;
    }

    async function updateStatus(id, status) {
      await fetch(`/api/admin/orders/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
    }

    async function deleteOrder(id) {
      if (confirm('Xóa phiếu này?')) {
        await fetch(`/api/admin/orders/${id}`, { method: 'DELETE' });
        loadOrders();
      }
    }

    loadOrders();
  </script>
</body>
</html>
