<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Quản Lý Sửa Chữa Tin Học & Điện Thoại Bảo Bối</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6">
  <div class="max-w-5xl mx-auto space-y-6">
    
    <!-- Header -->
    <header class="bg-white p-6 rounded-2xl shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-xl font-bold text-slate-800">Quản Lý Sửa Chữa - Cửa Hàng Tin HọcBảo Bối</h1>
        <p class="text-xs text-slate-500">Hệ thống tạo phiếu & tra cứu bảo hành</p>
      </div>
      <button onclick="toggleScanner()" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m0 14v1m8-8h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707" />
        </svg>
        Mở Camera Quét IMEI
      </button>
    </header>

    <!-- Khu vực quét Camera -->
    <div id="scannerContainer" class="hidden bg-white p-4 rounded-2xl shadow-sm max-w-md mx-auto text-center">
      <div id="reader" class="overflow-hidden rounded-xl"></div>
      <button onclick="toggleScanner()" class="mt-3 w-full bg-slate-200 text-slate-700 font-medium py-2 rounded-xl text-sm hover:bg-slate-300">Đóng Camera</button>
    </div>

    <!-- Form Nhập Đơn Mới -->
    <div class="bg-white p-6 rounded-2xl shadow-sm">
      <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
        <span>📝</span> Tiếp Nhận Thiết Bị Mới
      </h2>
      
      <form id="orderForm" onsubmit="createOrder(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Tên khách hàng <span class="text-red-500">*</span></label>
          <input type="text" id="customerName" required placeholder="Nguyễn Văn A" class="w-full px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Số điện thoại <span class="text-red-500">*</span></label>
          <input type="text" id="phone" required placeholder="0901234567" class="w-full px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Tên thiết bị <span class="text-red-500">*</span></label>
          <input type="text" id="deviceName" required placeholder="iPhone 13 Pro / Laptop Dell XPS" class="w-full px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Số IMEI / Serial Number</label>
          <input type="text" id="imei" placeholder="Nhập tay hoặc quét camera..." class="w-full px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1">Tình trạng lỗi (Khách báo)</label>
          <textarea id="issueDescription" rows="2" placeholder="Không lên nguồn, thay màn hình..." class="w-full px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Tình trạng ngoại hình lúc nhận</label>
          <input type="text" id="conditionNotes" placeholder="Trầy góc, trầy kính lưng..." class="w-full px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Thời hạn bảo hành</label>
          <select id="warrantyPeriod" class="w-full px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <option value="0">Không bảo hành</option>
            <option value="3">3 Tháng</option>
            <option value="6">6 Tháng</option>
            <option value="12">12 Tháng</option>
          </select>
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1">Ghi chú thêm (Nội bộ)</label>
          <input type="text" id="notes" placeholder="Mật khẩu máy: 1234..." class="w-full px-3.5 py-2.5 border rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div class="md:col-span-2 mt-2">
          <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition flex items-center justify-center gap-2">
            <span>Tạo Phiếu Nhận Máy</span>
          </button>
        </div>
      </form>
    </div>

    <!-- Danh Sách Đơn Sửa Chữa -->
    <div class="bg-white p-6 rounded-2xl shadow-sm">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-slate-800">📋 Danh Sách Đơn Gần Đây</h2>
        <button onclick="loadOrders()" class="text-sm text-blue-600 hover:underline">🔄 Tải lại</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b text-slate-500 text-xs uppercase bg-slate-50">
              <th class="p-3">Mã đơn</th>
              <th class="p-3">Khách hàng</th>
              <th class="p-3">Thiết bị & IMEI</th>
              <th class="p-3">Trạng thái</th>
              <th class="p-3 text-center">Thao tác</th>
            </tr>
          </thead>
          <tbody id="orderTableBody" class="text-sm divide-y">
            <tr><td colspan="5" class="p-4 text-center text-slate-400">Đang tải danh sách...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    let html5QrcodeScanner = null;

    // Quét IMEI qua Camera
    function toggleScanner() {
      const container = document.getElementById('scannerContainer');
      container.classList.toggle('hidden');
      if (!container.classList.contains('hidden')) {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render((decodedText) => {
          document.getElementById('imei').value = decodedText;
          toggleScanner();
          html5QrcodeScanner.clear();
        });
      } else if (html5QrcodeScanner) {
        html5QrcodeScanner.clear();
      }
    }

    // Load danh sách đơn sửa chữa
    async function loadOrders() {
      const tbody = document.getElementById('orderTableBody');
      try {
        const res = await fetch('/api/admin/orders');
        const orders = await res.json();
        
        if (!orders || orders.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-slate-400">Chưa có đơn hàng nào</td></tr>';
          return;
        }

        tbody.innerHTML = orders.map(o => `
          <tr class="hover:bg-slate-50">
            <td class="p-3 font-semibold text-blue-600">${o.orderCode || 'N/A'}</td>
            <td class="p-3">
              <div class="font-medium text-slate-800">${o.customerName}</div>
              <div class="text-xs text-slate-400">${o.phone}</div>
            </td>
            <td class="p-3">
              <div class="font-medium text-slate-800">${o.deviceName}</div>
              <div class="text-xs text-slate-400">${o.imei || 'Không có IMEI'}</div>
            </td>
            <td class="p-3">
              <select onchange="updateStatus('${o._id}', this.value)" class="text-xs border rounded-lg p-1.5 bg-white focus:ring-2 focus:ring-blue-500">
                <option value="Đang tiếp nhận" ${o.status === 'Đang tiếp nhận' ? 'selected' : ''}>Đang tiếp nhận</option>
                <option value="Đang sửa chữa" ${o.status === 'Đang sửa chữa' ? 'selected' : ''}>Đang sửa chữa</option>
                <option value="Đã hoàn tất" ${o.status === 'Đã hoàn tất' ? 'selected' : ''}>Đã hoàn tất</option>
                <option value="Đã trả khách" ${o.status === 'Đã trả khách' ? 'selected' : ''}>Đã trả khách</option>
              </select>
            </td>
            <td class="p-3 text-center">
              <button onclick="deleteOrder('${o._id}')" class="text-red-500 hover:text-red-700 font-medium text-xs">Xóa</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-500">Lỗi kết nối máy chủ: ${err.message}</td></tr>`;
      }
    }

    // Tạo đơn sửa chữa mới
    async function createOrder(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '⏳ Đang lưu...';

      const bodyData = {
        customerName: document.getElementById('customerName').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        deviceName: document.getElementById('deviceName').value.trim(),
        imei: document.getElementById('imei').value.trim(),
        issueDescription: document.getElementById('issueDescription').value.trim(),
        conditionNotes: document.getElementById('conditionNotes').value.trim(),
        warrantyPeriod: document.getElementById('warrantyPeriod').value,
        notes: document.getElementById('notes').value.trim()
      };

      try {
        const res = await fetch('/api/admin/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyData)
        });

        const result = await res.json();

        if (res.ok && result.success) {
          alert('✅ Tạo phiếu nhận máy thành công!');
          document.getElementById('orderForm').reset();
          loadOrders();
        } else {
          alert('❌ Lỗi tạo đơn: ' + (result.error || 'Vui lòng kiểm tra lại thông tin'));
        }
      } catch (err) {
        alert('❌ Lỗi kết nối mạng: ' + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Tạo Phiếu Nhận Máy</span>';
      }
    }

    // Cập nhật trạng thái
    async function updateStatus(id, status) {
      try {
        await fetch(`/api/admin/orders/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
      } catch (err) {
        alert('Lỗi cập nhật trạng thái: ' + err.message);
      }
    }

    // Xóa đơn hàng
    async function deleteOrder(id) {
      if (!confirm('Bạn có chắc chắn muốn xóa đơn này không?')) return;
      try {
        const res = await fetch(`/api/admin/orders/${id}`, { method: 'DELETE' });
        if (res.ok) {
          loadOrders();
        }
      } catch (err) {
        alert('Lỗi xóa đơn: ' + err.message);
      }
    }

    // Tải danh sách đơn khi mở trang
    loadOrders();
  </script>
</body>
</html>
